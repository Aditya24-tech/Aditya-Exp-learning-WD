<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Pasta Bella</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<header>
    <h1>🍝 La Pasta Bella</h1>
    <p>Authentic Italian Taste</p>
</header>

<nav>
    <a href="#gallery">Gallery</a>
    <a href="#menu">Menu</a>
    <a href="#reservation">Reservation</a>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <h2>Delicious Italian Food</h2>
        <p>Experience Italy in Every Bite</p>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery">
    <h2>Our Ambiance</h2>
    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=800&q=80">
        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=800&q=80">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80">
    </div>
</section>

<!-- MENU -->
<section id="menu">
    <h2>Our Menu</h2>

    <div class="menu">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80">
            <h3>Pizza</h3>
            <p>₹250</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=800&q=80">
            <h3>Pasta</h3>
            <p>₹350</p>
        </div>
    </div>
</section>

<!-- FORM -->
<section id="reservation">
    <h2>Book a Table</h2>

    <form>
        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Email">
        <input type="date">
        <input type="time">
        <button type="submit">Reserve</button>
    </form>
</section>

<footer>
    <p>© 2026 La Pasta Bella</p>
</footer>

</body>
</html>
