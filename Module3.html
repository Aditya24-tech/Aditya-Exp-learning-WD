<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Pasta Bella</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ===== BODY ===== */
body{
    font-family:'Poppins',sans-serif;
    background:#f4f4f4;
    color:#333;
    opacity:0;
    transition:0.5s;
}

/* ===== HEADER ===== */
header{
    background:linear-gradient(135deg,#8B0000,#ff4d4d);
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    font-size:2.8rem;
}

header p{
    margin-top:10px;
}

/* ===== NAVBAR ===== */
nav{
    background:#111;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:1000;
}

nav a{
    color:white;
    padding:15px 20px;
    text-decoration:none;
    transition:0.3s;
    font-weight:600;
}

nav a:hover{
    background:#8B0000;
}

/* ===== HERO SECTION ===== */
.hero{
    height:70vh;
    background:url('https://images.unsplash.com/photo-1555992336-03a23c7b20ee?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-text{
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:10px;
    color:white;
}

.hero-text h2{
    font-size:45px;
}

.hero-text p{
    margin-top:10px;
    font-size:18px;
}

.hero-text button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    background:#ff4d4d;
    color:white;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;
}

.hero-text button:hover{
    background:#8B0000;
}

/* ===== SECTIONS ===== */
section{
    padding:60px 10%;
    transition:all 0.8s ease;
}

section h2{
    text-align:center;
    margin-bottom:30px;
    font-size:32px;
    color:#8B0000;
}

/* ===== GALLERY ===== */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    transition:0.3s;
    height:250px;
    object-fit:cover;
}

.gallery img:hover{
    transform:scale(1.08);
}

/* ===== MENU FILTER BUTTONS ===== */
.menu-buttons{
    text-align:center;
    margin-bottom:30px;
}

.menu-buttons button{
    width:auto;
    margin:5px;
    padding:10px 20px;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
    border-radius:5px;
    transition:0.3s;
}

.menu-buttons button:hover,
.menu-buttons button.active{
    background:#8B0000;
}

/* ===== MENU ===== */
.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    transition:0.3s;
    text-align:center;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    padding:15px 10px 5px;
}

.card p{
    padding-bottom:15px;
    color:#8B0000;
    font-weight:bold;
}

/* ===== FORM ===== */
#reservation{
    background:#eee;
}

form{
    max-width:450px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,
select,
button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    background:#8B0000;
    color:white;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff4d4d;
}

/* ===== HIDE ===== */
.d-none{
    display:none;
}

/* ===== FOOTER ===== */
footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){

    .hero-text h2{
        font-size:28px;
    }

    nav{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <h1>🍝 La Pasta Bella</h1>
    <p>Authentic Italian Taste</p>
</header>

<!-- ===== NAVBAR ===== -->
<nav>
    <a href="#gallery">Gallery</a>
    <a href="#menu">Menu</a>
    <a href="#reservation">Reservation</a>
</nav>

<!-- ===== HERO ===== -->
<section class="hero">
    <div class="hero-text">
        <h2>Delicious Italian Food</h2>
        <p>Experience Italy in Every Bite</p>
        <button onclick="document.querySelector('#reservation').scrollIntoView({behavior:'smooth'})">
            Book Now
        </button>
    </div>
</section>

<!-- ===== GALLERY ===== -->
<section id="gallery">
    <h2>Our Ambiance</h2>

    <div class="gallery">
        <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=800&q=80" alt="Restaurant Interior">

        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=800&q=80" alt="Dining Area">

        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80" alt="Italian Food">
    </div>
</section>

<!-- ===== MENU ===== -->
<section id="menu">

    <h2>Our Menu</h2>

    <!-- FILTER BUTTONS -->
    <div class="menu-buttons">
        <button class="active" onclick="filterMenu('all', this)">All</button>
        <button onclick="filterMenu('pizza', this)">Pizza</button>
        <button onclick="filterMenu('pasta', this)">Pasta</button>
    </div>

    <div class="menu">

        <div class="card pizza">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=800&q=80" alt="Pizza">
            <h3>Italian Pizza</h3>
            <p>₹250</p>
        </div>

        <div class="card pasta">
            <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?auto=format&fit=crop&w=800&q=80" alt="Pasta">
            <h3>Creamy Pasta</h3>
            <p>₹350</p>
        </div>

    </div>

</section>

<!-- ===== RESERVATION ===== -->
<section id="reservation">

    <h2>Book a Table</h2>

    <form>

        <input type="text" placeholder="Your Name">

        <input type="email" placeholder="Email">

        <input type="date">

        <input type="time">

        <select>
            <option>1 Person</option>
            <option>2 People</option>
            <option>4 People</option>
            <option>6+ People</option>
        </select>

        <button type="submit">Reserve Table</button>

    </form>

</section>

<!-- ===== FOOTER ===== -->
<footer>
    <p>© 2026 La Pasta Bella | All Rights Reserved</p>
</footer>

<script>

// ===============================
// DOM READY
// ===============================
document.addEventListener("DOMContentLoaded", function () {

    // PAGE LOAD EFFECT
    window.addEventListener("load", () => {
        document.body.style.opacity = "1";
    });

    // ===============================
    // SMOOTH SCROLL
    // ===============================
    document.querySelectorAll("nav a").forEach(link => {

        link.addEventListener("click", function (e) {

            e.preventDefault();

            let target = document.querySelector(this.getAttribute("href"));

            if(target){

                target.scrollIntoView({
                    behavior:"smooth"
                });

            }

        });

    });

    // ===============================
    // FORM VALIDATION
    // ===============================
    let form = document.querySelector("form");

    form.addEventListener("submit", function (e) {

        e.preventDefault();

        let name = form.querySelector("input[type='text']");
        let email = form.querySelector("input[type='email']");
        let date = form.querySelector("input[type='date']");
        let time = form.querySelector("input[type='time']");

        let isValid = true;

        form.querySelectorAll("input, select").forEach(el => {
            el.style.border = "1px solid #ccc";
        });

        // NAME
        if(name.value.trim() === ""){

            name.style.border = "2px solid red";
            isValid = false;

        }

        // EMAIL
        if(!email.value.includes("@")){

            email.style.border = "2px solid red";
            isValid = false;

        }

        // DATE
        if(date.value === ""){

            date.style.border = "2px solid red";
            isValid = false;

        }

        // TIME
        if(time.value === ""){

            time.style.border = "2px solid red";
            isValid = false;

        }

        // INVALID
        if(!isValid){

            alert("❌ Please fill all fields correctly!");
            return;

        }

        // SUCCESS
        alert("✅ Table Reserved Successfully!");

        form.reset();

    });

    // ===============================
    // DATE RESTRICTION
    // ===============================
    let dateInput = document.querySelector("input[type='date']");
    let today = new Date().toISOString().split("T")[0];

    dateInput.setAttribute("min", today);

    // ===============================
    // TIME RESTRICTION
    // ===============================
    let timeInput = document.querySelector("input[type='time']");

    timeInput.addEventListener("change", function(){

        let selectedTime = this.value;

        if(selectedTime < "10:00" || selectedTime > "23:00"){

            alert("⏰ Booking allowed between 10AM to 11PM");

            this.value = "";

        }

    });

    // ===============================
    // SCROLL FADE ANIMATION
    // ===============================
    let sections = document.querySelectorAll("section");

    function checkSections(){

        let triggerBottom = window.innerHeight * 0.85;

        sections.forEach(section => {

            let sectionTop = section.getBoundingClientRect().top;

            if(sectionTop < triggerBottom){

                section.style.opacity = "1";
                section.style.transform = "translateY(0)";

            }
            else{

                section.style.opacity = "0";
                section.style.transform = "translateY(50px)";

            }

        });

    }

    window.addEventListener("scroll", checkSections);

    checkSections();

});

// ===============================
// MENU FILTER
// ===============================
function filterMenu(category, btn){

    let cards = document.querySelectorAll(".card");
    let buttons = document.querySelectorAll(".menu-buttons button");

    buttons.forEach(button => {
        button.classList.remove("active");
    });

    btn.classList.add("active");

    cards.forEach(card => {

        if(category === "all"){

            card.classList.remove("d-none");

        }
        else if(card.classList.contains(category)){

            card.classList.remove("d-none");

        }
        else{

            card.classList.add("d-none");

        }

    });

}

</script>

</body>
</html>
